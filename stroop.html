<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ストループ課題実験</title>
    <!-- jsPsych コアライブラリ (v7.3.4) -->
    <script src="https://unpkg.com/jspsych@7.3.4"></script>
    <!-- jsPsych 標準CSS -->
    <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" type="text/css" />
    <!-- 各種プラグインの読み込み -->
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.2"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.1"></script>
    <!-- 参加者情報入力用のプラグインを追加 -->
    <script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.2"></script>
    
    <style>
        body, html {
            background-color: #FFFFFF;
            color: #333333;
            font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* jsPsychのデフォルトのマージンを完全に排除し、画面中央に固定する */
        .jspsych-content-wrapper {
            background-color: #FFFFFF !important;
            display: flex !important;
            align-items: center !important;  /* 上下中央 */
            justify-content: center !important; /* 左右中央 */
            height: 100vh !important;
            width: 100vw !important;
            padding: 0 !important;
            margin: 0 !important;
        }

        /* jsPsychが自動で付与する上部マージンを強制リセット */
        .jspsych-content {
            margin-top: 0 !important;
            display: flex !important;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .stroop-stimulus {
            font-size: 60px;
            font-weight: bold;
            line-height: 1.2; /* 文字が切れないよう高さを確保 */
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            height: 1.5em; /* フォントサイズに基づいた高さを固定 */
            margin: 0;
        }

        /* 教示画面のスタイル */
        .instructions {
            font-size: 24px;
            line-height: 1.6;
            text-align: left;
            display: inline-block;
            max-width: 800px;
        }

        /* 注視点（+）のスタイル */
        .fixation-mark {
            font-size: 60px;
            line-height: 1.2;
        }

        /* ボタンのスタイル調整 */
        .jspsych-btn {
            font-size: 20px !important;
            padding: 10px 24px !important;
            border-radius: 8px !important;
            margin-top: 20px;
        }

        /* データ送信時のローディングおよび完了メッセージのスタイル */
        .status-container {
            font-size: 20px;
            line-height: 1.8;
            text-align: center;
            max-width: 600px;
            padding: 20px;
        }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #09f;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error-text {
            color: #d9534f;
            font-weight: bold;
        }
        .success-text {
            color: #5cb85c;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="jspsych-target"></div>

    <script>
        // 送信先GASのWebアプリURL
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxQESdptLc_LXyip-NRPMB0865Xco8kPyYcBj_aDeD20MaLr9cp_mUMdkYwnzb-NuDD/exec";

        const jsPsych = initJsPsych({
            display_element: 'jspsych-target',
            on_finish: function() {
                // 実験終了時にデータの抽出とGAS送信を実行
                sendDataWithRetry();
            }
        });

        let timeline = [];

        // 1. 参加者情報入力（subject_id）画面
        const participant_info = {
            type: jsPsychSurveyText,
            questions: [
                {
                    prompt: '参加者ID（例：学籍番号や氏名イニシャル等）を入力してください。', 
                    placeholder: 'IDを入力してください', 
                    required: true,
                    name: 'subject_id'
                }
            ],
            button_label: '次へ進む',
            on_finish: function(data) {
                // 入力されたIDを取得
                const id = data.response.subject_id;
                // 現在の日時（timestamp）を取得
                const timestamp = new Date().toLocaleString('ja-JP');
                
                // すべてのデータ行に共通して保存されるプロパティを設定
                jsPsych.data.addProperties({
                    subject_id: id,
                    timestamp: timestamp
                });
            }
        };
        timeline.push(participant_info);

        // Permissions Policy制限がある環境でも止まらないよう、カスタムボタンでフルスクリーン要求処理を行います。
        const fullscreen_gate = {
            type: jsPsychHtmlButtonResponse,
            stimulus: '<p style="font-size: 24px;">実験を開始します。下のボタンを押してください。</p>',
            choices: ['実験を開始する'],
            on_finish: function() {
                const element = document.documentElement;
                try {
                    if (element.requestFullscreen) {
                        element.requestFullscreen().catch(err => {
                            console.warn("Fullscreen policy restricted: ", err.message);
                        });
                    }
                } catch (e) {
                    console.warn("Fullscreen API not supported.", e.message);
                }
            }
        };
        timeline.push(fullscreen_gate);

        const instructions = {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: `
                <div class="instructions">
                    <p>これより実験を始めます。</p>
                    <p>画面中央に色がついた「文字」が表示されます。<br>
                    文字の意味ではなく、<strong>「文字の色」</strong>をできるだけ速く正確に回答してください。</p>
                    <p>対応するキーは以下の通りです：</p>
                    <ul>
                        <li><span style="color:red; font-weight:bold;">赤色</span>の文字なら：<strong>'r'</strong> キー</li>
                        <li><span style="color:blue; font-weight:bold;">青色</span>の文字なら：<strong>'b'</strong> キー</li>
                        <li><span style="color:green; font-weight:bold;">緑色</span>の文字なら：<strong>'g'</strong> キー</li>
                    </ul>
                    <br>
                    <p style="text-align:center"><strong>スペースキー</strong>を押すと開始します。</p>
                </div>
            `,
            choices: [' '],
            post_trial_gap: 500
        };
        timeline.push(instructions);

        const words = ["赤", "青", "緑"];
        const colors = ["red", "blue", "green"];
        let stimuli = [];

        for (let w of words) {
            for (let c of colors) {
                stimuli.push({
                    stimulus: `<div class="stroop-stimulus" style="color:${c}">${w}</div>`,
                    word: w,
                    color: c,
                    condition: (w === "赤" && c === "red") || (w === "青" && c === "blue") || (w === "緑" && c === "green") ? "congruent" : "incongruent",
                    correct_response: c === "red" ? "r" : (c === "blue" ? "b" : "g")
                });
            }
        }

        // 注視点
        const fixation = {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: '<div class="fixation-mark">+</div>',
            choices: "NO_KEYS",
            trial_duration: 500,
            data: { task: 'fixation' }
        };

        // 刺激提示
        const stroop_trial = {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: jsPsych.timelineVariable('stimulus'),
            choices: ['r', 'b', 'g'],
            data: {
                task: 'response',
                word: jsPsych.timelineVariable('word'),
                color: jsPsych.timelineVariable('color'),
                condition: jsPsych.timelineVariable('condition'),
                correct_response: jsPsych.timelineVariable('correct_response')
            },
            on_finish: function(data) {
                // 正誤判定を厳密に true / false という文字（String）またはBoolean値として記録
                const isCorrect = jsPsych.pluginAPI.compareKeys(data.response, data.correct_response);
                data.correct = isCorrect ? "true" : "false";
            }
        };

        // 試行間隔 (ITI)
        const iti = {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: '',
            choices: "NO_KEYS",
            trial_duration: 1000
        };

        const test_procedure = {
            timeline: [fixation, stroop_trial, iti],
            timeline_variables: stimuli,
            sample: {
                type: 'with-replacement', 
                size: 10
            }
        };
        timeline.push(test_procedure);

        jsPsych.run(timeline);


        // ==========================================
        // データの加工と送信に関する関数群
        // ==========================================

        /**
         * 分析に必要な試行（response）のみ抽出し、特定カラムだけをCSV化
         */
        function getFilteredCsv() {
            // 反応キーが記録されたデータのみをフィルタリング
            const rawData = jsPsych.data.get().filter({ task: 'response' }).values();
            
            // CSVヘッダーの定義
            const headers = ["subject_id", "timestamp", "word", "color", "condition", "rt", "correct"];
            
            // 各データ行を作成
            const csvRows = [headers.join(",")];
            
            for (let trial of rawData) {
                const row = [
                    escapeCsvValue(trial.subject_id),
                    escapeCsvValue(trial.timestamp),
                    escapeCsvValue(trial.word),
                    escapeCsvValue(trial.color),
                    escapeCsvValue(trial.condition),
                    trial.rt, // 数値はそのまま
                    escapeCsvValue(trial.correct) // true or false
                ];
                csvRows.push(row.join(","));
            }
            
            return csvRows.join("\n");
        }

        /**
         * CSVのカンマや改行・ダブルクォーテーションを考慮したエスケープ処理
         */
        function escapeCsvValue(val) {
            if (val === undefined || val === null) return "";
            let s = String(val);
            if (s.includes(",") || s.includes('"') || s.includes("\n") || s.includes("\r")) {
                s = s.replace(/"/g, '""');
                return `"${s}"`;
            }
            return s;
        }

        /**
         * 指数バックオフを使用した、安全なデータ自動送信
         */
        async function sendDataWithRetry() {
            const displayElement = jsPsych.getDisplayElement();
            
            // 1. CSVデータの生成
            const csvData = getFilteredCsv();

            // 2. 画面を送信中の状態に変更（安全に書き換え）
            displayElement.innerHTML = `
                <div class="status-container">
                    <h3>実験が終了しました。お疲れ様でした。</h3>
                    <p>データをスプレッドシートに送信しています。ブラウザを閉じずにそのままお待ちください...</p>
                    <div class="spinner"></div>
                </div>
            `;

            const maxRetries = 5;
            let attempt = 0;
            let success = false;

            while (attempt < maxRetries && !success) {
                try {
                    // 送信処理（GASにPOST）
                    const response = await fetch(GAS_URL, {
                        method: "POST",
                        mode: "no-cors", // クロスドメイン(CORS)制約回避
                        headers: {
                            "Content-Type": "text/plain"
                        },
                        body: csvData
                    });

                    // no-cors の場合、レスポンスオブジェクトは不透明 (opaque) となり、
                    // ステータスをJavaScriptで直接読めませんが、リクエスト自体が正常に通れば success とみなせます。
                    success = true;
                } catch (error) {
                    attempt++;
                    console.warn(`送信失敗。リトライ ${attempt}/${maxRetries}... エラー内容:`, error);
                    
                    if (attempt < maxRetries) {
                        // 指数バックオフによる待機時間の計算（1秒, 2秒, 4秒, 8秒 と段階的に増加）
                        const delay = Math.pow(2, attempt - 1) * 1000;
                        
                        displayElement.innerHTML = `
                            <div class="status-container">
                                <h3>実験が終了しました。お疲れ様でした。</h3>
                                <p class="error-text">一時的なネットワークエラーが発生しました。</p>
                                <p>接続を確認しています。${delay / 1000}秒後に再送信を試みます (${attempt}/${maxRetries})...</p>
                                <div class="spinner"></div>
                            </div>
                        `;
                        await new Promise(resolve => setTimeout(resolve, delay));
                    }
                }
            }

            // 3. 送信結果に応じた画面表示
            if (success) {
                displayElement.innerHTML = `
                    <div class="status-container">
                        <h2 class="success-text">送信が完了しました！</h2>
                        <p>実験データは安全に自動記録されました。</p>
                        <p>これでブラウザを閉じて、ウィンドウを終了していただいて構いません。</p>
                        <p>ご協力ありがとうございました。</p>
                    </div>
                `;
            } else {
                // 何度も送信に失敗した場合の安全なフォールバック
                displayElement.innerHTML = `
                    <div class="status-container">
                        <h2 class="error-text">自動送信に失敗しました</h2>
                        <p>ネットワークエラー等によりデータを自動的に保存できませんでした。</p>
                        <p>お手数ですが、以下のテキストエリアの内容をすべてコピーし、実験者にメール等で送信してください。</p>
                        <textarea style="width: 100%; height: 200px; font-family: monospace; font-size: 12px;" readonly>${csvData}</textarea>
                        <p style="margin-top: 15px;">※コピーが完了しましたら、ブラウザを閉じても大丈夫です。</p>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
